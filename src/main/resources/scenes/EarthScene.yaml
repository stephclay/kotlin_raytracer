
camera:
  imageWidth: 400
  imageHeight: 400
  cameraCenter: [ 0, 0, 12 ]
  background: [ 0.70, 0.80, 1.00 ]
  fieldOfView: 20
  viewportCenter: [ 0, 0, 0 ]
